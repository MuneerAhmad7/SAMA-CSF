<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Falak Pay — Security Awareness Program</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="sidebar no-print">
  <div class="brand">🎓 Falak Pay
    <small>Awareness Program — Lab 09</small>
  </div>
  <nav>
    <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
    <a href="{{ url_for('employees') }}">👥 Employees</a>
    <a href="{{ url_for('courses') }}">📚 Course Catalog</a>
    <a href="{{ url_for('training') }}">✅ Training Assignments</a>
    <a href="{{ url_for('simulations') }}">🎣 Simulation Campaigns</a>
    <a href="{{ url_for('audit') }}">📜 Audit Log</a>
    <a href="{{ url_for('report') }}">🖨 Printable Report</a>
  </nav>
</div>
<div class="main">
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
