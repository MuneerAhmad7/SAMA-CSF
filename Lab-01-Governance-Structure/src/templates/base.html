<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Governance Tracker — Lab 01</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f5f7fa; }
    .navbar-brand { font-weight:700; }
    .rag-green { background:#d1e7dd; }
    .rag-amber { background:#fff3cd; }
    .rag-red { background:#f8d7da; }
    .card-metric { border:none; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">🛡 Governance Tracker</a>
    <div class="navbar-nav">
      <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
      <a class="nav-link" href="{{ url_for('policies') }}">Policies</a>
      <a class="nav-link" href="{{ url_for('raci') }}">RACI</a>
      <a class="nav-link" href="{{ url_for('meetings') }}">Meetings</a>
      <a class="nav-link" href="{{ url_for('metrics') }}">KPI/KRI</a>
      <a class="nav-link" href="{{ url_for('compliance') }}">Compliance Checklist</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-success">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
