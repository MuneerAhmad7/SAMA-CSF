<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><title>Register — SecurePay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:480px;">
  <h2 class="mb-4">🏦 SecurePay — Register User</h2>
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="alert alert-warning">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  <form method="post" class="card p-4 shadow-sm">
    <div class="mb-3"><label class="form-label">Username</label>
      <input class="form-control" name="username" required></div>
    <div class="mb-3"><label class="form-label">Password</label>
      <input class="form-control" type="password" name="password" required></div>
    <div class="mb-3"><label class="form-label">Role</label>
      <select class="form-select" name="role">
        <option>Maker</option><option>Checker</option><option>Admin</option>
      </select>
    </div>
    <button class="btn btn-primary">Register &amp; Enroll MFA</button>
  </form>
  <p class="mt-3"><a href="{{ url_for('login') }}">Already registered? Log in</a></p>
</div>
</body>
</html>
