{% extends "base.html" %}
{% block title %}Log Incident · GRC Lab{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Log New Incident</h1>
</div>

<div class="card">
  <form method="post">
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" required></textarea>
    </div>
    <div class="form-group">
      <label>Severity</label>
      <select name="severity">
        {% for r in risks %}
          <option value="{{ r }}">{{ r }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Reported By</label>
      <input type="text" name="reported_by" required>
    </div>

    <button class="btn" type="submit">Log Incident</button>
    <a class="btn btn-secondary" href="{{ url_for('incidents') }}">Cancel</a>
  </form>
</div>

{% endblock %}
