<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><title>Login — SecurePay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:480px;">
  <h2 class="mb-4">🏦 SecurePay — Login</h2>
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="alert alert-warning">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  <form method="post" class="card p-4 shadow-sm">
    <div class="mb-3"><label class="form-label">Username</label>
      <input class="form-control" name="username" required></div>
    <div class="mb-3"><label class="form-label">Password</label>
      <input class="form-control" type="password" name="password" required></div>
    <div class="mb-3"><label class="form-label">6-digit MFA code</label>
      <input class="form-control" name="totp_code" required placeholder="from your authenticator app"></div>
    <button class="btn btn-primary">Login</button>
  </form>
  <p class="mt-3"><a href="{{ url_for('register') }}">New user? Register here</a></p>
</div>
</body>
</html>
