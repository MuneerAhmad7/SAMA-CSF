{% extends "base.html" %}
{% block content %}
<h1>Governance RACI Matrix</h1>
<p class="subtitle">SAMA CSF 1.4, NCA ECC 1‑4‑3</p>

<div class="card">
  <form method="post" class="inline-form">
    <div class="field"><label>Activity</label><input name="activity" required style="min-width:220px"></div>
    <div class="field"><label>Responsible</label><input name="responsible"></div>
    <div class="field"><label>Accountable</label><input name="accountable"></div>
    <div class="field"><label>Consulted</label><input name="consulted"></div>
    <div class="field"><label>Informed</label><input name="informed"></div>
    <button class="btn">Add</button>
  </form>
</div>

<table>
  <thead><tr><th>Activity</th><th>R</th><th>A</th><th>C</th><th>I</th></tr></thead>
  <tbody>
  {% for e in entries %}
    <tr>
      <td>{{ e.activity }}</td><td>{{ e.responsible }}</td><td>{{ e.accountable }}</td>
      <td>{{ e.consulted }}</td><td>{{ e.informed }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
