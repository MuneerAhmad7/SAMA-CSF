{% extends "base.html" %}
{% block content %}
<h2>Cyber Security Committee / Board Meetings</h2>
<form method="post" class="row g-2 bg-white p-3 rounded mb-4 shadow-sm">
  <div class="col-md-2"><input class="form-control" type="date" name="meeting_date" required></div>
  <div class="col-md-4"><input class="form-control" name="attendees" placeholder="Attendees"></div>
  <div class="col-12"><textarea class="form-control" name="agenda" placeholder="Agenda"></textarea></div>
  <div class="col-12"><textarea class="form-control" name="decisions" placeholder="Decisions"></textarea></div>
  <div class="col-12"><textarea class="form-control" name="action_items" placeholder="Action items (owner + due date)"></textarea></div>
  <div class="col-md-2"><button class="btn btn-primary w-100">Log Meeting</button></div>
</form>

{% for m in meetings %}
  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title">{{ m.meeting_date }}</h5>
      <p><strong>Attendees:</strong> {{ m.attendees }}</p>
      <p><strong>Agenda:</strong> {{ m.agenda }}</p>
      <p><strong>Decisions:</strong> {{ m.decisions }}</p>
      <p><strong>Action Items:</strong> {{ m.action_items }}</p>
    </div>
  </div>
{% endfor %}
{% endblock %}
