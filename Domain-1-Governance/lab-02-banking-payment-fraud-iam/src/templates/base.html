<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SecurePay — Lab 02</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f5f7fa; }
    .risk-HIGH { background:#f8d7da; }
    .risk-MEDIUM { background:#fff3cd; }
    .risk-LOW, .risk-None { background:#d1e7dd; }
    .card-metric { border:none; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .navbar-brand { font-weight:700; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">🏦 SecurePay — Lab 02</a>
    <div class="navbar-nav">
      <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
      <a class="nav-link" href="{{ url_for('payments') }}">Payments</a>
      <a class="nav-link" href="{{ url_for('audit') }}">Audit Log</a>
      <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-info">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
