{% extends "base.html" %}
{% block content %}
<h1>Charter Builder</h1>
<p class="subtitle">SAMA CSF 1.1/1.2, NCA ECC 1‑2 — define the CISO's mandate, authority, and independence</p>

<form method="post" class="card form-stack">
  {% for key, label, help_text, is_textarea in fields %}
    <div class="field">
      <label>{{ label }}</label>
      <div class="help-text">{{ help_text }}</div>
      {% if is_textarea %}
        <textarea name="{{ key }}">{{ data.get(key, '') }}</textarea>
      {% else %}
        <input name="{{ key }}" value="{{ data.get(key, '') }}">
      {% endif %}
    </div>
  {% endfor %}
  <button class="btn">Save Charter</button>
</form>
{% endblock %}
