{% extends "base.html" %}
{% block title %}New Policy · GRC Lab{% endblock %}
{% block content %}

<div class="page-header">
  <h1>New Policy</h1>
</div>

<div class="card">
  <form method="post">
    <div class="form-group">
      <label>Policy Name</label>
      <input type="text" name="name" required>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select name="category">
        {% for c in categories %}
          <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description"></textarea>
    </div>
    <div class="form-group">
      <label>Version</label>
      <input type="text" name="version" value="1.0">
    </div>
    <div class="form-group">
      <label>Effective Date</label>
      <input type="text" name="effective_date" placeholder="YYYY-MM-DD">
    </div>

    <button class="btn" type="submit">Publish Policy</button>
    <a class="btn btn-secondary" href="{{ url_for('policies') }}">Cancel</a>
  </form>
</div>

{% endblock %}
